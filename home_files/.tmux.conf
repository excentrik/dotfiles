set -g default-terminal "screen-256color"

# Advertise 24-bit (true-color) RGB support to applications running inside
# tmux when the outer terminal supports it. Both the RGB and Tc capabilities
# are honored by tmux >=2.2; older tmux just ignores the override silently.
# Patterns cover the common modern terminals (alacritty, kitty, foot, wezterm,
# iTerm2 via `xterm-256color`/`tmux-256color`, gnome-terminal, etc.).
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",foot:Tc"

# Make mouse useful in copy mode
setw -g mouse on

# Scroll History
set -g history-limit 30000

# Set ability to capture on start and restore on exit window data when running an application
setw -g alternate-screen on

# Lower escape timing from 500ms to 50ms for quicker response to scroll-buffer access.
set -s escape-time 50
#bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Use Vim shortcuts
setw -g mode-keys vi

# Bind ctrl-l to clear history and screen
bind -n C-l send-keys C-l \; send-keys -R \; clear-history \;

# Make `Ctrl+B R` reload the config file
unbind r
bind r source-file ~/.tmux.conf
